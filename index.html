<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0b4f8a">
<title>Acesso à Rede Wi-Fi</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,Arial,sans-serif}
:root{
 --bg:#edf2f7;--card:#fff;--text:#003366;--sub:#666;--box:#f8f9fb;--foot:#777;
}
@media (prefers-color-scheme: dark){
 :root{
  --bg:#0f172a;--card:#1e293b;--text:#e2e8f0;--sub:#cbd5e1;--box:#334155;--foot:#cbd5e1;
 }
}
body{
 background:var(--bg);display:flex;justify-content:center;align-items:flex-start;
 min-height:100vh;padding:30px 15px;overflow-x:hidden;overflow-y:auto;
 transition:.3s;
}
body::before{
 content:"";position:fixed;inset:0;
 background:url("20bpm.jpg") center center no-repeat;
 background-size:min(45vw,520px);
 opacity:.05;pointer-events:none;
}
.card{
 width:min(92%,560px);
 background:var(--card);border-radius:20px;padding:35px;text-align:center;
 box-shadow:0 15px 35px rgba(0,0,0,.15);
 position:relative;animation:fade .6s ease;
 color:var(--text);
}
@keyframes fade{
 from{opacity:0;transform:translateY(20px)}
 to{opacity:1;transform:translateY(0)}
}
.logo{width:90px;margin-bottom:15px}
h1{color:#0b4f8a;font-size:clamp(22px,2.2vw,30px);margin-bottom:5px}
@media (prefers-color-scheme: dark){h1{color:#7cc7ff}}
h2{color:var(--sub);font-weight:500;font-size:16px;margin-bottom:30px}
.box{background:var(--box);border-radius:12px;padding:18px;margin-bottom:18px}
.label{color:var(--sub);font-size:14px}
.value{margin-top:8px;font-size:22px;font-weight:bold;color:var(--text);word-break:break-word}
.password{letter-spacing:3px;font-family:Consolas,monospace}
button{
 margin-top:20px;width:100%;border:none;border-radius:10px;padding:15px;
 background:#0b7dda;color:#fff;font-size:18px;cursor:pointer;
 transition:.25s;box-shadow:0 5px 15px rgba(0,0,0,.15)
}
button:hover{background:#095ea4;transform:translateY(-2px)}
.secondary{background:#2d8f4e}
.secondary:hover{background:#216d3b}
footer{margin-top:30px;color:var(--foot);font-size:13px;line-height:1.6}
@media(max-width:768px){
 .card{padding:28px}.logo{width:75px}
 h1{font-size:22px}h2{font-size:15px}.value{font-size:20px}
 button{font-size:17px}
}
@media(max-width:420px){
 .card{padding:22px}.logo{width:65px}
 h1{font-size:20px}h2{font-size:14px}.value{font-size:18px}
 button{padding:13px;font-size:16px}
}
</style>
</head>
<body>
<div class="card">
<img src="20bpm.jpg" class="logo" alt="Brasão do 20º BPM">
<h1>20º BATALHÃO DA POLÍCIA MILITAR DO PARÁ</h1>
<h2>Acesso à Rede Wi‑Fi</h2>

<div class="box">
<div class="label">📶 Rede</div>
<div class="value" id="ssid"></div>
</div>

<div class="box">
<div class="label">🔒 Senha</div>
<div class="value password" id="senha">••••••••••••</div>
</div>

<button id="btnMostrar" onclick="mostrarSenha()">👁 Mostrar Senha</button>
<button class="secondary" id="btnCopiar" onclick="copiarSenha()">📋 Copiar Senha</button>

<footer>
Após copiar a senha, conecte-se normalmente à rede Wi‑Fi.
<br><br>
<hr style="border:none;border-top:1px solid rgba(128,128,128,.3);margin:15px 0;">
<strong>P4 - 20º Batalhão da Polícia Militar do Pará</strong><br>
Sistema de Acesso à Rede Wi-Fi<br><br>
© 2026<br>
Todos os direitos reservados.<br><br>
</footer>
</div>

<script>
const WIFI_NAME="WIFI-20ºBPM";
const WIFI_PASSWORD="20CPC.pmp@";
document.getElementById("ssid").textContent=WIFI_NAME;
let senhaVisivel=false;
function mostrarSenha(){
 const senha=document.getElementById("senha");
 const botao=document.getElementById("btnMostrar");
 if(!senhaVisivel){
   senha.textContent=WIFI_PASSWORD;
   botao.textContent="🙈 Ocultar Senha";
 }else{
   senha.textContent="••••••••••••";
   botao.textContent="👁 Mostrar Senha";
 }
 senhaVisivel=!senhaVisivel;
}
async function copiarSenha(){
 try{
   await navigator.clipboard.writeText(WIFI_PASSWORD);
   const btn=document.getElementById("btnCopiar");
   const original=btn.textContent;
   btn.textContent="✅ Senha copiada";
   setTimeout(()=>btn.textContent=original,2000);
 }catch(e){
   alert("Não foi possível copiar a senha.");
 }
}
</script>
</body>
</html>
